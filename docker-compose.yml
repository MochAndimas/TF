services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-backend
    env_file:
      - .env
    environment:
      ENV: development
      TZ: Asia/Jakarta
      DEV_HOST: 0.0.0.0
      DEV_PORT: 8000
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 1
      FRONTEND_URL: http://backend:8000,http://localhost:5504,http://127.0.0.1:5504,http://localhost:8501,http://127.0.0.1:8501
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./run:/app/run
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-frontend
    env_file:
      - .env
    environment:
      ENV: development
      TZ: Asia/Jakarta
      STREAMLIT_API_HOST: http://backend:8000
    command: streamlit run streamlit_run.py --server.port 5504 --server.address 0.0.0.0
    ports:
      - "5504:5504"
    depends_on:
      - backend
    volumes:
      - ./.streamlit:/app/.streamlit:ro
      - ./app/db:/app/app/db
      - ./logs:/app/logs
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-scheduler
    env_file:
      - .env
    environment:
      ENV: development
      TZ: Asia/Jakarta
      DEV_HOST: 0.0.0.0
      DEV_PORT: 8000
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 1
    command: ["/bin/bash", "/app/docker/scheduler-entrypoint.sh"]
    depends_on:
      - backend
    volumes:
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./run:/app/run
    restart: unless-stopped
