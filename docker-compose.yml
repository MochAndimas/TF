services:
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-db-init
    env_file:
      - .env
    environment:
      ENV: development
      TZ: Asia/Jakarta
      DEV_HOST: 0.0.0.0
      DEV_PORT: 8000
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 1
      AUTO_INIT_DB_ON_STARTUP: "false"
      ALLOW_CONCURRENT_ETL_RUNS: "false"
    command: python init_db.py
    volumes:
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./run:/app/run
      - ./backups/sqlite:/app/backups/sqlite
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-backend
    env_file:
      - .env
    environment:
      ENV: development
      TZ: Asia/Jakarta
      DEV_HOST: 0.0.0.0
      DEV_PORT: 8000
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 1
      AUTO_INIT_DB_ON_STARTUP: "false"
      ALLOW_CONCURRENT_ETL_RUNS: "false"
      FRONTEND_URL: http://backend:8000,http://localhost:5504,http://127.0.0.1:5504,http://localhost:8501,http://127.0.0.1:8501
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./run:/app/run
      - ./backups/sqlite:/app/backups/sqlite
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-frontend
    env_file:
      - .env
    environment:
      ENV: development
      TZ: Asia/Jakarta
      STREAMLIT_API_HOST: http://backend:8000
    command: streamlit run streamlit_run.py --server.port 5504 --server.address 0.0.0.0
    ports:
      - "5504:5504"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./.streamlit:/app/.streamlit:ro
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./backups/sqlite:/app/backups/sqlite
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5504/_stcore/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-scheduler
    env_file:
      - .env
    environment:
      ENV: development
      TZ: Asia/Jakarta
      DEV_HOST: 0.0.0.0
      DEV_PORT: 8000
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 1
      AUTO_INIT_DB_ON_STARTUP: "false"
      ALLOW_CONCURRENT_ETL_RUNS: "false"
    command: ["/bin/bash", "/app/docker/scheduler-entrypoint.sh"]
    depends_on:
      db-init:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    volumes:
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./run:/app/run
      - ./backups/sqlite:/app/backups/sqlite
    healthcheck:
      test: ["CMD-SHELL", "pgrep cron >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
