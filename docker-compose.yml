services:
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-db-init
    env_file:
      - .env
    environment:
      TZ: Asia/Jakarta
      HOST: ${HOST}
      PORT: ${PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
      INTERNAL_TRUSTED_HOSTS: backend,frontend
      WORKERS: 1
      AUTO_INIT_DB_ON_STARTUP: "false"
      ALLOW_CONCURRENT_ETL_RUNS: "false"
    command: python init_db.py
    volumes:
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./run:/app/run
      - ./backups/sqlite:/app/backups/sqlite
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-backend
    env_file:
      - .env
    environment:
      TZ: Asia/Jakarta
      HOST: ${HOST}
      PORT: ${PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
      INTERNAL_TRUSTED_HOSTS: backend,frontend
      WORKERS: 1
      AUTO_INIT_DB_ON_STARTUP: "false"
      ALLOW_CONCURRENT_ETL_RUNS: "false"
    command: python main.py
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./run:/app/run
      - ./backups/sqlite:/app/backups/sqlite
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT}/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-frontend
    env_file:
      - .env
    environment:
      TZ: Asia/Jakarta
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
      STREAMLIT_API_HOST: http://backend:${PORT}
    command: streamlit run streamlit_run.py --server.port ${FRONTEND_PORT} --server.address 0.0.0.0
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./.streamlit:/app/.streamlit:ro
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./backups/sqlite:/app/backups/sqlite
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${FRONTEND_PORT}/_stcore/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf-scheduler
    env_file:
      - .env
    environment:
      TZ: Asia/Jakarta
      HOST: ${HOST}
      PORT: ${PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
      INTERNAL_TRUSTED_HOSTS: backend,frontend
      WORKERS: 1
      AUTO_INIT_DB_ON_STARTUP: "false"
      ALLOW_CONCURRENT_ETL_RUNS: "false"
    command: ["/bin/bash", "/app/docker/scheduler-entrypoint.sh"]
    depends_on:
      db-init:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    volumes:
      - ./app/db:/app/app/db
      - ./logs:/app/logs
      - ./run:/app/run
      - ./backups/sqlite:/app/backups/sqlite
    healthcheck:
      test: ["CMD-SHELL", "pgrep cron >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
